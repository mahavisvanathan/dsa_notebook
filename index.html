<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Programming Artifacts — Visual Aids</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@400;500;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #f0eee8;
    --muted: rgba(240,238,232,0.45);
    --hint: rgba(240,238,232,0.2);
    --purple: #8b7cf8;
    --purple-light: #b8aeff;
    --purple-dim: rgba(139,124,248,0.15);
    --teal: #2dd4a0;
    --teal-dim: rgba(45,212,160,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  header {
    text-align: center;
    margin-bottom: 3rem;
  }

  header h1 {
    font-family: 'Syne', sans-serif;
    font-size: 2.5rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    margin-bottom: 0.5rem;
  }

  header p {
    color: var(--muted);
    font-size: 0.95rem;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1.25rem;
    width: 100%;
    max-width: 900px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 12px;
    padding: 1.5rem;
    text-decoration: none;
    color: var(--text);
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    transition: border-color 0.2s, background 0.2s, transform 0.15s;
  }

  .card:hover {
    border-color: var(--purple);
    background: var(--surface2);
    transform: translateY(-2px);
  }

  .card-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    color: var(--teal);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .card h2 {
    font-family: 'Syne', sans-serif;
    font-size: 1.15rem;
    font-weight: 700;
  }

  .card p {
    font-size: 0.85rem;
    color: var(--muted);
    line-height: 1.5;
  }

  footer {
    margin-top: 4rem;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    color: var(--hint);
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>
  <header>
    <h1>Programming Artifacts</h1>
    <p>Visual aids for programming concepts</p>
  </header>

  <main class="grid">
    <a class="card" href="/dp">
      <span class="card-tag">visualizer</span>
      <h2>Dynamic Programming</h2>
      <p>Step-by-step visualization of classic DP problems — Fibonacci, LCS, Edit Distance, and more.</p>
    </a>
  </main>

  <footer>visualize the subproblem</footer>
</body>
</html>
